<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>MEDIA KITA TV</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
html, body { height:100%; }

body {
  margin:0;
  background:#050505;
  color:#eaeaea;
  font-family:'Share Tech Mono', monospace;
  overflow:hidden;
  letter-spacing:1px;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  height:80px;
  padding:0 40px;
  background:#000;
  border-bottom:2px solid #ff7a00;
}

.title {
  font-size:34px;
  font-weight:700;
  letter-spacing:4px;
  color:#ff7a00;
  text-transform:uppercase;
}

#clock {
  font-size:22px;
  color:#ffaa33;
}

/* LAYOUT */
.main { display:flex; height:calc(100vh - 80px); }

.left {
  width:28%;
  min-width:300px;
  max-width:420px;
  padding:20px;
  border-right:1px solid #222;
  display:flex;
  flex-direction:column;
  position:relative;
  height:100%;
}

.highlight-title {
  font-size:24px;
  color:#ff7a00;
  margin-bottom:20px;
}

.highlight-box {
  padding:18px;
  background:#000;
  border:1px solid #ff7a00;
  font-size:16px;
  display:flex;
  flex-direction:column;
  gap:6px;
  transition: all 0.6s ease;
}

/* RIGHT */
.right { flex:1; display:flex; flex-direction:column; overflow:hidden; }

/* GRID */
.table-header,
.row {
  display:grid;
  grid-template-columns: 100px 2.2fr 1.3fr 1.6fr;
}

.table-header {
  height:50px;
  font-size:16px;
  font-weight:700;
  color:#ff7a00;
  background:#111;
}

.table-header div,
.row div {
  display:flex;
  align-items:center;
  padding:0 8px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* SCROLL */
#scrollWrapper { flex:1; overflow:hidden; position:relative; }
#scrollContent { position:absolute; width:100%; }

/* ROW */
.row {
  height:52px;
  font-size:24px;
  text-transform:uppercase;
  background-color:#050505;
}
.row:nth-child(even){ background:#0a0a0a; }

/* CREW */
.crew-section {
  position:absolute;
  bottom:20px;
  left:20px;
  right:20px;
}

.crew-title {
  font-size:16px;
  color:#ff7a00;
  margin-bottom:10px;
  text-transform:uppercase;
  font-weight:700;
}

.crew-slider {
  border:1px solid #ff7a00;
  background:#000;
  aspect-ratio:3/4;
  position:relative;
  overflow:hidden;
}

.crew-slider img {
  width:100%;
  height:100%;
  object-fit:contain;
  transition:opacity 0.4s ease;
}

.crew-name {
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  height:50px;
  background:rgba(0,0,0,0.85);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#ffaa33;
  font-size:24px;
  font-weight:700;
}

/* fade */
.fade-out { opacity:0; }
</style>
</head>

<body>

<header>
  <div style="display:flex; align-items:center; gap:14px;">
    <img src="https://raw.githubusercontent.com/mediakitaproductions/imageapp/555c0fffa480ce0dc7d5f422ddd117123511b742/mkp-logo-white-title.png" style="height:34px;">
    <div class="title">MEDIA KITA SCHEDULE</div>
  </div>
  <div id="clock"></div>
</header>

<div class="main">

  <div class="left">
    <div class="highlight-title">EVENT TERDEKAT</div>
    <div id="highlight" class="highlight-box"></div>

    <div class="crew-section">
      <div class="crew-title">OUR CREW</div>
      <div class="crew-slider">
        <img id="crewImage" src="">
        <div id="crewName" class="crew-name"></div>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="table-header">
      <div>DATE</div>
      <div>EVENT</div>
      <div>CLIENT</div>
      <div>LOCATION</div>
    </div>

    <div id="scrollWrapper">
      <div id="scrollContent"></div>
    </div>
  </div>

</div>

<script>
const apiURL = "https://script.google.com/macros/s/AKfycbxRLGXgLuH1Wt6isqes6Cp5pWEu-G5yNO93U8sISMLpOBjXpxt-RbI5CpD73xXf0Qar/exec";

let crew = [];
let crewIndex = 0;

/* LOAD CREW */
async function loadCrew(){
  const res = await fetch("https://api.github.com/repos/mediakitaproductions/foto-tim-mk/contents/");
  const data = await res.json();

  crew = data
    .filter(f => f.name.endsWith(".png"))
    .map(f => ({
      name: f.name.replace(".png","").toUpperCase(),
      foto: f.download_url
    }));

  crew.sort(() => Math.random() - 0.5);

  if(crew.length){
    displayCrew(0);
    preloadNext();
    setInterval(rotateCrew, 5000);
  }
}

/* PRELOAD NEXT */
function preloadNext(){
  const next = crew[(crewIndex + 1) % crew.length];
  const img = new Image();
  img.src = next.foto;
}

/* DISPLAY (FIX DELAY) */
function displayCrew(index){
  const img = document.getElementById("crewImage");
  const name = document.getElementById("crewName");

  const current = crew[index];

  const temp = new Image();
  temp.src = current.foto;

  temp.onload = () => {
    img.src = current.foto;
    name.innerText = current.name;
  };

  temp.onerror = () => {
    crewIndex = (crewIndex + 1) % crew.length;
    displayCrew(crewIndex);
  };
}

/* ROTATE */
function rotateCrew(){
  const img = document.getElementById("crewImage");

  img.classList.add("fade-out");

  setTimeout(() => {
    crewIndex = (crewIndex + 1) % crew.length;
    displayCrew(crewIndex);
    preloadNext();
    img.classList.remove("fade-out");
  }, 300);
}

/* CLOCK */
setInterval(()=>{
  document.getElementById("clock").innerText = new Date().toLocaleTimeString();
},1000);

loadCrew();
</script>

</body>
</html>
