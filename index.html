<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>MEDIA KITA TV</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

html, body { height:100%; }

body {
  margin:0;
  background:#050505;
  color:#eaeaea;
  font-family:'Share Tech Mono', monospace;
  overflow:hidden;
  letter-spacing:1px;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  height:80px;
  padding:0 40px;
  background:#000;
  border-bottom:2px solid #ff7a00;
}

.title {
  font-size:34px;
  font-weight:700;
  letter-spacing:4px;
  color:#ff7a00;
  text-transform:uppercase;
}

#clock {
  font-size:22px;
  color:#ffaa33;
}

/* LAYOUT */
.main {
  display:flex;
  height:calc(100vh - 80px);
}

/* LEFT */
.left {
  width:28%;
  min-width:300px;
  max-width:420px;
  padding:20px;
  border-right:1px solid #222;
  display:flex;
  flex-direction:column;
  position:relative;
  height:100%;
}

.highlight-title {
  font-size:24px;
  color:#ff7a00;
  margin-bottom:20px;
}

.highlight-box {
  padding:18px;
  background:#000;
  border:1px solid #ff7a00;
  font-size:16px;
  display:flex;
  flex-direction:column;
  gap:6px;
  transition: all 0.6s ease;
}

/* RIGHT */
.right {
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* GRID */
.table-header,
.row {
  display:grid;
  grid-template-columns: 100px 2.2fr 1.3fr 1.6fr;
}

/* HEADER TABLE */
.table-header {
  height:50px;
  font-size:16px;
  font-weight:700;
  color:#ff7a00;
  background:#111;
  letter-spacing:1px;
}

.gate-icon {
  width:3px;
  height:20px;
  background:linear-gradient(to bottom, #ff7a00, #ffaa33);
  margin-right:12px;
  display:inline-block;
}

.table-header div,
.row div {
  justify-content:flex-start;
  display:flex;
  align-items:center;
  padding:0 8px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  position: relative;
}

.table-header div:not(:last-child)::after,
.row div:not(:last-child)::after {
  content: '';
  position: absolute;
  right: 0;
  top: 15%;
  height: 70%;
  width: 1px;
  background: linear-gradient(to bottom, transparent, rgba(255,122,0,0.4), transparent);
}

.table-header div:nth-child(2),
.row div:nth-child(2) {
  padding-left:4px;
}

/* SCROLL */
#scrollWrapper {
  flex:1;
  overflow:hidden;
  position:relative;
}

#scrollContent {
  position:absolute;
  width:100%;
}

/* ROW */
.row {
  height:52px;
  font-size:24px;
  text-transform:uppercase;
  background-color:#050505;
  background-image: 
    linear-gradient(rgba(255,255,255,0.12) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.12) 1px, transparent 1px);
  background-size: 3px 3px;
  box-shadow: inset 0 0 8px rgba(255,122,0,0.15);
}

.row div {
  letter-spacing:0.3px;
  border-right: 1px solid rgba(255,122,0,0.2);
}

.row div:last-child {
  border-right: none;
}

.row:nth-child(odd){ background-color:#050505; }
.row:nth-child(even){ background-color:#0a0a0a; }

.row div:nth-child(2){ color:#ff7a00; }
.row div:nth-child(4){ color:#ff7a00; }

.past-row {
  background-color: rgba(0, 50, 0, 0.2) !important;
  color: #00aa00;
}

.past-row div:nth-child(2),
.past-row div:nth-child(4) {
  color: #00aa00;
}

/* MONTH */
.month {
  padding:8px 16px;
  font-size:18px;
  color:#ff7a00;
  background:#0a0a0a;
  font-weight: bold;
  text-transform: uppercase;
}

/* HIGHLIGHT */
.hl-title {
  font-size:20px;
  color:#ffaa33;
  font-weight:700;
}

.hl-list {
  display:flex;
  flex-direction:column;
  gap:6px;
}

.hl-list div {
  display:flex;
  gap:10px;
}

.hl-icon {
  width:20px;
  color:#ff7a00;
}

/* CREW */
.crew-section {
  position:absolute;
  bottom:20px;
  left:20px;
  right:20px;
}

.crew-title {
  font-size:16px;
  color:#ff7a00;
  margin-bottom:10px;
  text-transform:uppercase;
  font-weight:700;
}

.crew-slider {
  margin-top:10px;
  border:1px solid #ff7a00;
  background:#000;
  aspect-ratio: 3 / 4;
  position:relative;
  overflow:hidden;
}

/* 🔥 NETFLIX STYLE */
.crew-img {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transform:scale(1);
  transition:opacity 0.8s ease, transform 6s ease;
}

.crew-img.active {
  opacity:1;
  transform:scale(1.08);
}

.crew-overlay {
  position:absolute;
  inset:0;
  background:linear-gradient(
    to top,
    rgba(0,0,0,0.9),
    transparent
  );
}

/* NAME */
.crew-name {
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  height:50px;
  background:rgba(0,0,0,0.85);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#ffaa33;
  border-top:1px solid #ff7a00;
  font-size:24px;
  font-weight:700;
  text-transform:uppercase;
}
</style>
</head>

<body>

<header>
  <div style="display:flex; align-items:center; gap:14px;">
    <img src="https://raw.githubusercontent.com/mediakitaproductions/imageapp/555c0fffa480ce0dc7d5f422ddd117123511b742/mkp-logo-white-title.png" style="height:34px;">
    <div class="title">MEDIA KITA SCHEDULE</div>
  </div>
  <div id="clock"></div>
</header>

<div class="main">

  <div class="left">
    <div class="highlight-title">EVENT TERDEKAT</div>
    <div id="highlight" class="highlight-box"></div>

    <div class="crew-section">
      <div class="crew-title">OUR CREW</div>

      <!-- 🔥 UPDATED -->
      <div class="crew-slider">
        <img id="crewImageA" class="crew-img active">
        <img id="crewImageB" class="crew-img">
        <div class="crew-overlay"></div>
        <div id="crewName" class="crew-name"></div>
      </div>

    </div>
  </div>

  <div class="right">
    <div class="table-header">
      <div><span class="gate-icon"></span>DATE</div>
      <div><span class="gate-icon"></span>EVENT</div>
      <div><span class="gate-icon"></span>CLIENT</div>
      <div><span class="gate-icon"></span>LOCATION</div>
    </div>

    <div id="scrollWrapper">
      <div id="scrollContent"></div>
    </div>
  </div>

</div>

<script>
const apiURL = "https://script.google.com/macros/s/AKfycbxRLGXgLuH1Wt6isqes6Cp5pWEu-G5yNO93U8sISMLpOBjXpxt-RbI5CpD73xXf0Qar/exec";

/* CREW DATA */
let crew = [];
let crewIndex = 0;
let activeLayer = "A";

async function loadCrew(){
  let res = await fetch("https://api.github.com/repos/mediakitaproductions/foto-tim-mk/contents/");
  let data = await res.json();

  crew = data
    .filter(f => f.name.endsWith(".png"))
    .map(f => ({
      name: f.name.replace(".png","").toUpperCase(),
      foto: f.download_url
    }));

  if(crew.length){
    displayCrew(0);
    setInterval(rotateCrew, 5000);
  }
}

function displayCrew(index){
  const A = document.getElementById("crewImageA");
  const B = document.getElementById("crewImageB");
  const name = document.getElementById("crewName");

  const current = crew[index];

  const temp = new Image();
  temp.src = current.foto;

  temp.onload = () => {
    let show = activeLayer === "A" ? B : A;
    let hide = activeLayer === "A" ? A : B;

    activeLayer = activeLayer === "A" ? "B" : "A";

    show.src = current.foto;
    show.classList.add("active");
    hide.classList.remove("active");

    name.innerText = current.name;
  };
}

function rotateCrew(){
  crewIndex = (crewIndex + 1) % crew.length;
  displayCrew(crewIndex);
}

/* === ORIGINAL SCHEDULE (UNCHANGED) === */
let y = 0;
let events = [];
let highlightEvents = [];
let highlightIndex = 0;

function safe(v){ return v || "-"; }

function formatDate(v){
  let d = new Date(v);
  const day = String(d.getDate()).padStart(2, '0');
  const month = d.toLocaleDateString("id-ID",{month:"short"});
  return `${day} ${month}`;
}

function parseDate(v){ return v ? new Date(v) : new Date(0); }

function startScroll(){
  const el = document.getElementById("scrollContent");
  function animate(){
    y -= 0.35;
    el.style.transform = `translateY(${y}px)`;
    if(Math.abs(y) >= el.scrollHeight / 2){ y = 0; }
    requestAnimationFrame(animate);
  }
  animate();
}

async function loadData(){
  const res = await fetch(apiURL);
  const data = await res.json();

  events = data.sort((a,b)=> parseDate(a.Tanggal_Mulai)-parseDate(b.Tanggal_Mulai));

  let html = "";
  events.forEach(row=>{
    html += `
    <div class="row">
      <div>${formatDate(row.Tanggal_Mulai)}</div>
      <div>${row.Nama_Event}</div>
      <div>${row.Client_ID}</div>
      <div>${row.Lokasi}</div>
    </div>`;
  });

  document.getElementById("scrollContent").innerHTML = html + html;
  startScroll();
}

setInterval(()=>{
  document.getElementById("clock").innerText = new Date().toLocaleTimeString();
},1000);

loadData();
loadCrew();
</script>

</body>
</html>
