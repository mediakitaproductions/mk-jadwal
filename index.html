<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>MEDIA KITA TV</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
html, body { height:100%; }

body {
  margin:0;
  background:#050505;
  color:#eaeaea;
  font-family:'Share Tech Mono', monospace;
  overflow:hidden;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  height:80px;
  padding:0 40px;
  background:#000;
  border-bottom:2px solid #ff7a00;
}

.title {
  font-size:34px;
  color:#ff7a00;
}

#clock {
  font-size:22px;
  color:#ffaa33;
}

/* LAYOUT */
.main { display:flex; height:calc(100vh - 80px); }

.left {
  width:28%;
  min-width:300px;
  max-width:420px;
  padding:20px;
  border-right:1px solid #222;
  position:relative;
}

.highlight-title {
  font-size:24px;
  color:#ff7a00;
  margin-bottom:20px;
}

.highlight-box {
  padding:18px;
  background:#000;
  border:1px solid #ff7a00;
}

/* RIGHT */
.right { flex:1; display:flex; flex-direction:column; overflow:hidden; }

.table-header,
.row {
  display:grid;
  grid-template-columns: 100px 2.2fr 1.3fr 1.6fr;
}

.table-header {
  height:50px;
  font-size:16px;
  font-weight:700;
  color:#ff7a00;
  background:#111;
}

.row {
  height:52px;
  font-size:24px;
  text-transform:uppercase;
}

.row:nth-child(even){ background:#0a0a0a; }

/* CREW SECTION */
.crew-section {
  position:absolute;
  bottom:20px;
  left:20px;
  right:20px;
}

.crew-title {
  font-size:16px;
  color:#ff7a00;
  margin-bottom:10px;
  font-weight:700;
}

/* NETFLIX STYLE */
.crew-slider {
  border:1px solid #ff7a00;
  background:#000;
  aspect-ratio:3/4;
  position:relative;
  overflow:hidden;
}

.crew-img {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transform:scale(1);
  transition:opacity 0.8s ease, transform 6s ease;
}

.crew-img.active {
  opacity:1;
  transform:scale(1.08);
}

.crew-overlay {
  position:absolute;
  inset:0;
  background:linear-gradient(
    to top,
    rgba(0,0,0,0.9) 0%,
    rgba(0,0,0,0.4) 40%,
    transparent 70%
  );
}

.crew-name {
  position:absolute;
  bottom:10px;
  left:12px;
  right:12px;
  color:#fff;
  font-size:26px;
  font-weight:700;
  text-shadow:0 0 10px rgba(0,0,0,0.8);
}

/* SCROLL */
#scrollWrapper { flex:1; overflow:hidden; position:relative; }
#scrollContent { position:absolute; width:100%; }

</style>
</head>

<body>

<header>
  <div class="title">MEDIA KITA SCHEDULE</div>
  <div id="clock"></div>
</header>

<div class="main">

  <div class="left">
    <div class="highlight-title">EVENT TERDEKAT</div>
    <div id="highlight" class="highlight-box"></div>

    <div class="crew-section">
      <div class="crew-title">OUR CREW</div>

      <div class="crew-slider">
        <img id="crewImageA" class="crew-img active">
        <img id="crewImageB" class="crew-img">
        <div class="crew-overlay"></div>
        <div id="crewName" class="crew-name"></div>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="table-header">
      <div>DATE</div>
      <div>EVENT</div>
      <div>CLIENT</div>
      <div>LOCATION</div>
    </div>

    <div id="scrollWrapper">
      <div id="scrollContent"></div>
    </div>
  </div>

</div>

<script>
const apiURL = "https://script.google.com/macros/s/AKfycbxRLGXgLuH1Wt6isqes6Cp5pWEu-G5yNO93U8sISMLpOBjXpxt-RbI5CpD73xXf0Qar/exec";

/* =========================
   CREW (NETFLIX STYLE)
========================= */
let crew = [];
let crewIndex = 0;
let activeLayer = "A";

async function loadCrew(){
  const res = await fetch("https://api.github.com/repos/mediakitaproductions/foto-tim-mk/contents/");
  const data = await res.json();

  crew = data
    .filter(f => f.name.endsWith(".png"))
    .map(f => ({
      name: f.name.replace(".png","").toUpperCase(),
      foto: f.download_url
    }));

  crew.sort(() => Math.random() - 0.5);

  if(crew.length){
    displayCrew(0);
    preloadNext();
    setInterval(rotateCrew, 5000);
  }
}

function displayCrew(index){
  const imgA = document.getElementById("crewImageA");
  const imgB = document.getElementById("crewImageB");
  const name = document.getElementById("crewName");

  const current = crew[index];

  const temp = new Image();
  temp.src = current.foto;

  temp.onload = () => {
    let show, hide;

    if(activeLayer === "A"){
      show = imgB;
      hide = imgA;
      activeLayer = "B";
    } else {
      show = imgA;
      hide = imgB;
      activeLayer = "A";
    }

    show.src = current.foto;

    show.classList.add("active");
    hide.classList.remove("active");

    name.innerText = current.name;
  };

  temp.onerror = () => {
    crewIndex = (crewIndex + 1) % crew.length;
    displayCrew(crewIndex);
  };
}

function rotateCrew(){
  crewIndex = (crewIndex + 1) % crew.length;
  displayCrew(crewIndex);
  preloadNext();
}

function preloadNext(){
  const next = crew[(crewIndex + 1) % crew.length];
  const img = new Image();
  img.src = next.foto;
}

/* =========================
   SCHEDULE SYSTEM (FIXED)
========================= */

let y = 0;
let events = [];
let highlightEvents = [];
let highlightIndex = 0;

function safe(v){ return v || "-"; }

function formatDate(v){
  let d = new Date(v);
  return d.toLocaleDateString("id-ID",{day:"2-digit",month:"short"});
}

function parseDate(v){
  return v ? new Date(v) : new Date(0);
}

function isPast(event){
  const now = new Date();
  const end = event.Tanggal_Selesai ? parseDate(event.Tanggal_Selesai) : parseDate(event.Tanggal_Mulai);
  return end < now;
}

function startScroll(){
  const el = document.getElementById("scrollContent");
  function animate(){
    y -= 0.3;
    el.style.transform = `translateY(${y}px)`;
    if(Math.abs(y) >= el.scrollHeight / 2){ y = 0; }
    requestAnimationFrame(animate);
  }
  animate();
}

function renderHighlight(e){
  return `
    <div>${safe(e.Nama_Event)}</div>
    <div>${safe(e.Client_ID)}</div>
    <div>${safe(e.Lokasi)}</div>
  `;
}

function rotateHighlight(){
  const box = document.getElementById("highlight");
  if(!highlightEvents.length) return;

  box.style.opacity = 0;
  setTimeout(()=>{
    highlightIndex = (highlightIndex + 1) % highlightEvents.length;
    box.innerHTML = renderHighlight(highlightEvents[highlightIndex]);
    box.style.opacity = 1;
  }, 400);
}

function generateTableHTML(events){
  let html = "";
  events.forEach(row => {
    html += `
    <div class="row ${isPast(row) ? 'past-row' : ''}">
      <div>${formatDate(row.Tanggal_Mulai)}</div>
      <div>${safe(row.Nama_Event)}</div>
      <div>${safe(row.Client_ID)}</div>
      <div>${safe(row.Lokasi)}</div>
    </div>`;
  });
  return html;
}

async function loadData(){
  const res = await fetch(apiURL);
  const data = await res.json();

  events = data.sort((a,b)=> parseDate(a.Tanggal_Mulai)-parseDate(b.Tanggal_Mulai));
  highlightEvents = events.filter(e => !isPast(e));

  if(highlightEvents.length){
    document.getElementById("highlight").innerHTML = renderHighlight(highlightEvents[0]);
  }

  let html = generateTableHTML(events);
  document.getElementById("scrollContent").innerHTML = html + html;

  startScroll();
  setInterval(rotateHighlight, 15000);
}

/* =========================
   INIT
========================= */

setInterval(()=>{
  document.getElementById("clock").innerText = new Date().toLocaleTimeString();
},1000);

loadCrew();
loadData();
</script>

</body>
</html>
