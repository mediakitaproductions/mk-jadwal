<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>MEDIA KITA TV</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
body {
  margin:0;
  background:#050505;
  color:#eaeaea;
  font-family:'Share Tech Mono', monospace;
  overflow:hidden;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  border-bottom:2px solid #ff7a00;
}

.title { color:#ff7a00; font-size:30px; }
#clock { color:#ffaa33; }

/* LAYOUT */
.main { display:flex; height:calc(100vh - 80px); }

.left {
  width:28%;
  padding:20px;
  border-right:1px solid #222;
  position:relative;
}

/* RIGHT */
.right { flex:1; display:flex; flex-direction:column; }

.table-header {
  display:grid;
  grid-template-columns:100px 2fr 1.5fr 1.5fr;
  background:#111;
  color:#ff7a00;
  height:50px;
  align-items:center;
  padding:0 10px;
}

.row {
  display:grid;
  grid-template-columns:100px 2fr 1.5fr 1.5fr;
  height:50px;
  align-items:center;
  padding:0 10px;
  font-size:22px;
}

.row:nth-child(even){ background:#0a0a0a; }

/* SCROLL */
#scrollWrapper { flex:1; overflow:hidden; position:relative; }
#scrollContent { position:absolute; width:100%; }

/* CREW (NETFLIX) */
.crew-section { position:absolute; bottom:20px; left:20px; right:20px; }

.crew-slider {
  aspect-ratio:3/4;
  position:relative;
  overflow:hidden;
  border:1px solid #ff7a00;
}

.crew-img {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:opacity 0.8s ease, transform 6s ease;
}

.crew-img.active {
  opacity:1;
  transform:scale(1.08);
}

.crew-overlay {
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);
}

.crew-name {
  position:absolute;
  bottom:10px;
  left:10px;
  color:#fff;
  font-size:24px;
}
</style>
</head>

<body>

<header>
  <div class="title">MEDIA KITA SCHEDULE</div>
  <div id="clock"></div>
</header>

<div class="main">

  <div class="left">
    <div>EVENT TERDEKAT</div>
    <div id="highlight"></div>

    <div class="crew-section">
      <div>OUR CREW</div>

      <div class="crew-slider">
        <img id="crewImageA" class="crew-img active">
        <img id="crewImageB" class="crew-img">
        <div class="crew-overlay"></div>
        <div id="crewName" class="crew-name"></div>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="table-header">
      <div>DATE</div>
      <div>EVENT</div>
      <div>CLIENT</div>
      <div>LOCATION</div>
    </div>

    <div id="scrollWrapper">
      <div id="scrollContent"></div>
    </div>
  </div>

</div>

<script>
const apiURL = "https://script.google.com/macros/s/AKfycbxRLGXgLuH1Wt6isqes6Cp5pWEu-G5yNO93U8sISMLpOBjXpxt-RbI5CpD73xXf0Qar/exec";

/* CLOCK */
setInterval(()=>{
  document.getElementById("clock").innerText = new Date().toLocaleTimeString();
},1000);

/* ================= CREW ================= */
let crew=[], crewIndex=0, activeLayer="A";

async function loadCrew(){
  try{
    const res = await fetch("https://api.github.com/repos/mediakitaproductions/foto-tim-mk/contents/");
    const data = await res.json();

    crew = data.filter(f=>f.name.endsWith(".png"))
      .map(f=>({name:f.name.replace(".png","").toUpperCase(),foto:f.download_url}));

    if(crew.length){
      displayCrew(0);
      setInterval(rotateCrew,5000);
    }
  }catch(e){ console.log("Crew error",e); }
}

function displayCrew(i){
  const A=document.getElementById("crewImageA");
  const B=document.getElementById("crewImageB");
  const name=document.getElementById("crewName");

  const c=crew[i];
  const temp=new Image();
  temp.src=c.foto;

  temp.onload=()=>{
    let show = activeLayer==="A"?B:A;
    let hide = activeLayer==="A"?A:B;
    activeLayer = activeLayer==="A"?"B":"A";

    show.src=c.foto;
    show.classList.add("active");
    hide.classList.remove("active");

    name.innerText=c.name;
  };
}

function rotateCrew(){
  crewIndex=(crewIndex+1)%crew.length;
  displayCrew(crewIndex);
}

/* ================= SCHEDULE ================= */

let y=0;

function startScroll(){
  const el=document.getElementById("scrollContent");
  function anim(){
    y-=0.3;
    el.style.transform=`translateY(${y}px)`;
    if(Math.abs(y)>=el.scrollHeight/2) y=0;
    requestAnimationFrame(anim);
  }
  anim();
}

function renderTable(data){
  let html="";
  data.forEach(e=>{
    html+=`
    <div class="row">
      <div>${new Date(e.Tanggal_Mulai).toLocaleDateString("id-ID")}</div>
      <div>${e.Nama_Event}</div>
      <div>${e.Client_ID}</div>
      <div>${e.Lokasi}</div>
    </div>`;
  });
  return html;
}

async function loadData(){
  try{
    const res = await fetch(apiURL);
    let data = await res.json();

    if(!Array.isArray(data)) throw "Invalid data";

    const html = renderTable(data);

    const container = document.getElementById("scrollContent");
    container.innerHTML = html + html;

    startScroll();

  }catch(err){
    console.log("API ERROR, pakai dummy");

    const dummy=[
      {Tanggal_Mulai:new Date(),Nama_Event:"EVENT TEST",Client_ID:"CLIENT",Lokasi:"KUPANG"},
      {Tanggal_Mulai:new Date(),Nama_Event:"SHOOTING",Client_ID:"MEDIA KITA",Lokasi:"STUDIO"}
    ];

    const html = renderTable(dummy);
    document.getElementById("scrollContent").innerHTML = html + html;

    startScroll();
  }
}

/* INIT */
loadCrew();
loadData();
</script>

</body>
</html>
