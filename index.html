<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>MEDIA KITA TV</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ==================== BASE STYLES ==================== */
      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background:
          radial-gradient(
            circle at top,
            rgba(255, 122, 0, 0.16),
            transparent 24%
          ),
          linear-gradient(180deg, #060606 0%, #050505 54%, #090909 100%);
        color: #e8e8e8;
        font-family: "Share Tech Mono", monospace;
        overflow: hidden;
        letter-spacing: 0.9px;
        text-rendering: optimizeLegibility;
      }

      img {
        display: block;
        max-width: 100%;
      }

      /* ==================== HEADER STYLES ==================== */
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 80px;
        padding: 0 34px;
        background: rgba(10, 10, 10, 0.92);
        border-bottom: 1px solid rgba(255, 122, 0, 0.22);
        backdrop-filter: blur(12px);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      }

      .title {
        font-size: 32px;
        font-weight: 700;
        letter-spacing: 4px;
        color: #ffb462;
        text-transform: uppercase;
        text-shadow: 0 0 18px rgba(255, 122, 0, 0.22);
      }

      #clock {
        font-size: 22px;
        color: #ffb86c;
        text-shadow: 0 0 10px rgba(255, 170, 51, 0.25);
      }

      /* ==================== LAYOUT STYLES ==================== */
      .main {
        display: flex;
        flex-direction: column;
        min-height: calc(100vh - 80px);
        gap: 20px;
        padding: 22px 30px 30px;
      }

      /* TOP SECTION - UPCOMING EVENT */
      .top-section {
        width: 100%;
        padding: 26px;
        border-radius: 28px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.02),
          rgba(255, 122, 0, 0.03)
        );
        border: 1px solid rgba(255, 122, 0, 0.16);
        box-shadow:
          inset 0 0 30px rgba(255, 122, 0, 0.04),
          0 18px 40px rgba(0, 0, 0, 0.35);
        display: flex;
        flex-direction: column;
        height: 300px;
      }

      /* BOTTOM SECTION - TWO COLUMNS */
      .bottom-section {
        display: flex;
        gap: 20px;
        flex: 1;
        overflow: hidden;
      }

      /* LEFT PANEL - CREW */
      .left {
        width: 28%;
        min-width: 280px;
        max-width: 380px;
        padding: 0;
        border-radius: 28px;
        background: transparent;
        border: none;
        box-shadow: none;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      .highlight-title {
        font-size: 32px;
        color: #ffd385;
        margin-bottom: 18px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        text-align: center;
      }

      .highlight-box {
        flex: 1;
        background: linear-gradient(135deg, #0066cc, #0050a3);
        border-radius: 20px;
        border: none;
        font-size: 20px;
        display: grid;
        grid-template-columns: 130px 1fr 180px;
        gap: 0;
        transition:
          opacity 0.5s ease-out,
          transform 0.7s cubic-bezier(0.4, 0, 0.2, 1),
          background 0.6s ease,
          box-shadow 0.6s ease;
        box-shadow: 0 6px 20px rgba(0, 102, 204, 0.3);
        overflow: hidden;
        position: relative;
      }

      .highlight-box:hover {
        transform: translateY(-4px);
      }

      .highlight-box:hover::before {
        opacity: 0.1;
      }

      .highlight-box.color-blue:hover {
        box-shadow: 0 12px 30px rgba(0, 102, 204, 0.5);
      }

      .highlight-box.color-pink:hover {
        box-shadow: 0 12px 30px rgba(204, 0, 102, 0.5);
      }

      .highlight-box.color-gray:hover {
        box-shadow: 0 12px 30px rgba(136, 136, 136, 0.5);
      }

      .highlight-box.color-dark:hover {
        box-shadow: 0 12px 30px rgba(100, 100, 100, 0.5);
      }

      /* Color variants for highlight */
      .highlight-box.color-blue {
        background: linear-gradient(135deg, #0066cc, #0050a3) !important;
        box-shadow: 0 6px 20px rgba(0, 102, 204, 0.3) !important;
      }

      .highlight-box.color-pink {
        background: linear-gradient(135deg, #cc0066, #a30050) !important;
        box-shadow: 0 6px 20px rgba(204, 0, 102, 0.3) !important;
      }

      .highlight-box.color-gray {
        background: linear-gradient(135deg, #888888, #606060) !important;
        box-shadow: 0 6px 20px rgba(136, 136, 136, 0.3) !important;
      }

      .highlight-box.color-dark {
        background: linear-gradient(135deg, #1a1a1a, #0a0a0a) !important;
        box-shadow: 0 6px 20px rgba(26, 26, 26, 0.5) !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
      }

      /* Adjust text colors for different backgrounds */
      .highlight-box.color-pink .hl-date-num,
      .highlight-box.color-pink .hl-event-title,
      .highlight-box.color-pink .hl-time-val {
        color: #ffe0f0 !important;
      }

      .highlight-box.color-pink .hl-date-month,
      .highlight-box.color-pink .hl-event-subtitle,
      .highlight-box.color-pink .hl-location-val {
        color: #ffb3d9 !important;
      }

      .highlight-box.color-gray .hl-date-num,
      .highlight-box.color-gray .hl-event-title,
      .highlight-box.color-gray .hl-time-val {
        color: #ffffff !important;
      }

      .highlight-box.color-gray .hl-date-month,
      .highlight-box.color-gray .hl-event-subtitle,
      .highlight-box.color-gray .hl-location-val {
        color: #f0f0f0 !important;
      }

      .highlight-box.color-dark .hl-date-num,
      .highlight-box.color-dark .hl-event-title,
      .highlight-box.color-dark .hl-time-val {
        color: #ffffff !important;
      }

      .highlight-box.color-dark .hl-date-month,
      .highlight-box.color-dark .hl-event-subtitle,
      .highlight-box.color-dark .hl-location-val {
        color: #e8e8e8 !important;
      }

      .highlight-box.color-dark > div:first-child::after,
      .highlight-box.color-dark > div:last-child::before {
        background: rgba(255, 255, 255, 0.3) !important;
      }

      /* Highlight box children styling */
      .highlight-box > div {
        display: flex;
        align-items: center;
        padding: 20px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      .highlight-box > div:first-child {
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 4px;
        border-right: 2px solid rgba(255, 255, 255, 0.2);
        padding: 20px 12px;
      }

      .highlight-box .hl-date-num {
        font-size: 48px;
        line-height: 1;
        font-weight: 800;
        color: #fff;
      }

      .highlight-box .hl-date-month {
        font-size: 16px;
        color: #e8e8ff;
        letter-spacing: 2px;
      }

      .highlight-box > div:nth-child(2) {
        flex: 1;
        flex-direction: column;
        justify-content: center;
        gap: 6px;
        padding: 20px;
      }

      .highlight-box .hl-event-title {
        font-size: 28px;
        line-height: 1.2;
        color: #fff;
        font-weight: 800;
        letter-spacing: 0.5px;
      }

      .highlight-box .hl-event-subtitle {
        font-size: 14px;
        color: #d4e4ff;
        letter-spacing: 0.3px;
        font-weight: 500;
      }

      .highlight-box > div:last-child {
        flex-direction: column;
        justify-content: center;
        align-items: flex-end;
        gap: 4px;
        border-left: 2px solid rgba(255, 255, 255, 0.2);
        padding: 20px;
      }

      .highlight-box .hl-time-val {
        font-size: 16px;
        font-weight: 700;
        color: #fff;
        line-height: 1;
        letter-spacing: 0.5px;
      }

      .highlight-box .hl-location-val {
        font-size: 12px;
        color: #d4e4ff;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      /* RIGHT PANEL */
      .right {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ==================== TABLE STYLES ==================== */
      /* GRID LAYOUT */
      .table-header {
        display: none;
      }

      .row {
        display: grid;
        grid-template-columns: 130px 1fr 180px;
        gap: 0;
      }

      /* SCROLL CONTAINER */
      #scrollWrapper {
        flex: 1;
        overflow: hidden;
        position: relative;
        border-radius: 22px;
        border: 1px solid rgba(255, 122, 0, 0.14);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.02),
          rgba(0, 0, 0, 0.78)
        );
        box-shadow: inset 0 0 40px rgba(255, 122, 0, 0.03);
        padding: 20px;
      }

      #scrollWrapper::before,
      #scrollWrapper::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        height: 50px;
        pointer-events: none;
      }

      #scrollWrapper::before {
        top: 0;
        background: linear-gradient(180deg, rgba(4, 4, 4, 0.95), transparent);
      }

      #scrollWrapper::after {
        bottom: 0;
        background: linear-gradient(0deg, rgba(4, 4, 4, 0.95), transparent);
      }

      #scrollContent {
        position: absolute;
        width: calc(100% - 40px);
        top: 20px;
        left: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      /* ROW STYLES */
      .row {
        min-height: 100px;
        font-size: 18px;
        text-transform: uppercase;
        background: linear-gradient(135deg, #0066cc, #0050a3);
        transition:
          transform 0.28s ease,
          background 0.28s ease,
          box-shadow 0.28s ease;
        border-radius: 20px;
        padding: 0;
        position: relative;
        overflow: hidden;
        align-items: center;
        box-shadow: 0 6px 20px rgba(0, 102, 204, 0.3);
      }

      .row::before {
        content: "";
        position: absolute;
        bottom: -20px;
        right: -30px;
        width: 220px;
        height: 220px;
        background-image: url("./logo/mk%20logo%2002.png");
        background-size: contain;
        background-repeat: no-repeat;
        opacity: 0.08;
        pointer-events: none;
        z-index: 1;
      }

      .row:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 30px rgba(0, 102, 204, 0.5);
      }

      .row:hover::before {
        opacity: 0.12;
      }

      .row > div {
        display: flex;
        align-items: center;
        padding: 16px 20px;
        font-weight: 600;
        letter-spacing: 0.5px;
        position: relative;
        z-index: 2;
      }

      .row > div:first-child {
        flex: 0 0 130px;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 4px;
        border-right: 2px solid rgba(255, 255, 255, 0.2);
        padding: 16px 12px;
      }

      .row .date-num {
        font-size: 44px;
        line-height: 1;
        font-weight: 800;
        color: #fff;
      }

      .row .date-month {
        font-size: 16px;
        color: #e8e8ff;
        letter-spacing: 2px;
      }

      .row .detail-cell {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 6px;
        padding: 16px 20px;
      }

      .row .event-title {
        font-size: 26px;
        line-height: 1.2;
        color: #fff;
        font-weight: 800;
        letter-spacing: 0.5px;
      }

      .row .event-subtitle {
        font-size: 14px;
        color: #d4e4ff;
        letter-spacing: 0.3px;
        font-weight: 500;
      }

      .row .time-location {
        flex: 0 0 180px;
        flex-direction: column;
        justify-content: center;
        align-items: flex-end;
        gap: 4px;
        border-left: 2px solid rgba(255, 255, 255, 0.2);
        padding: 16px 20px;
      }

      .row .time-val {
        font-size: 14px;
        font-weight: 700;
        color: #fff;
        line-height: 1;
        letter-spacing: 0.5px;
      }

      .row .location-val {
        font-size: 12px;
        color: #d4e4ff;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .past-row {
        background: linear-gradient(135deg, #4a4a4a, #2a2a2a) !important;
        box-shadow: 0 6px 20px rgba(74, 74, 74, 0.3) !important;
      }

      .past-row .date-num,
      .past-row .event-title,
      .past-row .time-val {
        color: #c0c0c0 !important;
      }

      .past-row .date-month,
      .past-row .event-subtitle,
      .past-row .location-val {
        color: #9a9a9a !important;
      }

      .row.active {
        background: linear-gradient(135deg, #ff8f00, #ff6d00) !important;
        animation: cardGlow 1.2s ease;
        box-shadow: 0 12px 30px rgba(255, 111, 0, 0.6) !important;
      }

      @keyframes cardGlow {
        0%,
        100% {
          box-shadow: 0 12px 30px rgba(255, 111, 0, 0.6);
        }
        50% {
          box-shadow: 0 12px 40px rgba(255, 111, 0, 0.9);
        }
      }

      .row.decoded {
        background: linear-gradient(135deg, #0099ff, #0077cc) !important;
        box-shadow: 0 12px 30px rgba(0, 153, 255, 0.6) !important;
      }

      /* Color variations for different cards */
      .row:nth-child(1n) {
        background: linear-gradient(135deg, #0066cc, #0050a3) !important;
        box-shadow: 0 6px 20px rgba(0, 102, 204, 0.3) !important;
      }

      .row:nth-child(2n) {
        background: linear-gradient(135deg, #cc0066, #a30050) !important;
        box-shadow: 0 6px 20px rgba(204, 0, 102, 0.3) !important;
      }

      .row:nth-child(3n) {
        background: linear-gradient(135deg, #888888, #606060) !important;
        box-shadow: 0 6px 20px rgba(136, 136, 136, 0.3) !important;
      }

      .row:nth-child(4n) {
        background: linear-gradient(135deg, #1a1a1a, #0a0a0a) !important;
        box-shadow: 0 6px 20px rgba(26, 26, 26, 0.5) !important;
      }

      .row:nth-child(5n) {
        background: linear-gradient(135deg, #0066cc, #0050a3) !important;
        box-shadow: 0 6px 20px rgba(0, 102, 204, 0.3) !important;
      }

      /* glow halus + fade */
      @keyframes smoothBlink {
        0% {
          background: rgba(255, 122, 0, 0.04);
          box-shadow: 0 0 0px rgba(255, 122, 0, 0);
        }

        50% {
          background: rgba(255, 122, 0, 0.18);
          box-shadow: 0 0 16px rgba(255, 122, 0, 0.34);
        }

        100% {
          background: rgba(255, 122, 0, 0.12);
          box-shadow: 0 0 8px rgba(255, 122, 0, 0.2);
        }
      }

      .row {
        will-change: transform, background, box-shadow;
      }

      /* MONTH SEPARATOR */
      .month {
        display: none;
      }

      /* ==================== HIGHLIGHT STYLES ==================== */
      .hl-title {
        font-size: 22px;
        color: #ffd37e;
        font-weight: 700;
      }

      .hl-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .hl-list div {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        line-height: 1.5;
      }

      .hl-icon {
        width: 24px;
        color: #ffb86c;
      }

      .wrap {
        word-break: break-word;
      }

      /* ==================== CREW STYLES ==================== */
      .crew-section {
        position: relative;
        width: 100%;
        height: 100%;
        padding: 16px;
        display: flex;
        flex-direction: column;
      }

      .crew-title {
        font-size: 16px;
        color: #ffb86c;
        margin-bottom: 10px;
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 1px;
      }

      .crew-slider {
        margin-top: 8px;
        border-radius: 20px;
        border: 1px solid rgba(255, 122, 0, 0.28);
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.85),
          rgba(12, 12, 12, 0.98)
        );
        width: 100%;
        flex: 1;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: inset 0 0 26px rgba(255, 122, 0, 0.07);
        perspective: 1000px;
      }

      .crew-slider img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        border-radius: 20px;
        transform: scale(1);
        opacity: 1;
        transition:
          opacity 0.6s ease,
          transform 1.2s ease;
        will-change: transform, opacity;
      }

      .crew-slider img.fade-out {
        opacity: 0;
        transform: scale(1.08);
      }

      .crew-slider img.fade-in {
        opacity: 1;
        transform: scale(1);
      }

      .crew-slider::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          120deg,
          transparent,
          rgba(255, 255, 255, 0.08),
          transparent
        );
        opacity: 0;
        pointer-events: none;
      }

      .crew-slider.active::before {
        animation: lightSweep 1s ease;
      }

      @keyframes lightSweep {
        0% {
          transform: translateX(-100%);
          opacity: 0;
        }
        50% {
          opacity: 1;
        }
        100% {
          transform: translateX(100%);
          opacity: 0;
        }
      }

      .crew-slider::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        box-shadow: inset 0 0 18px rgba(255, 122, 0, 0.16);
      }

      .fade-out {
        opacity: 0;
      }

      /* ==================== LOADER FINAL ==================== */
      #loader {
        position: fixed;
        inset: 0;
        background: #050505;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition:
          opacity 0.8s ease,
          filter 0.8s ease,
          transform 0.8s ease;
      }

      #loader.hide {
        opacity: 0;
        filter: blur(10px);
        transform: scale(1.04);
      }

      .loader-wrap {
        position: relative;
        width: 220px;
        height: 220px;
      }

      .loader-wrap .logo {
        position: absolute;
        inset: 0;
        width: 120px;
        height: auto;
        margin: auto;
        z-index: 2;
        opacity: 0;
        animation: logoFade 1.2s ease forwards;
        animation-delay: 0.5s;
      }

      .ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 4px solid transparent;
        border-top: 4px solid rgba(255, 255, 255, 0.92);
        border-right: 4px solid rgba(255, 255, 255, 0.4);
        animation: spin 1.2s linear infinite;
      }

      .ring::after {
        content: "";
        position: absolute;
        inset: -6px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.18);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes logoFade {
        from {
          opacity: 0;
          transform: scale(0.8);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      body.ready {
        opacity: 1;
        animation: slightZoom 1.2s ease;
      }

      @keyframes slightZoom {
        from {
          transform: scale(1.02);
        }
        to {
          transform: scale(1);
        }
      }
    </style>
  </head>

  <body>
    <div id="loader">
      <div class="loader-wrap">
        <div class="ring"></div>
        <img
          src="https://raw.githubusercontent.com/mediakitaproductions/mk-jadwal/47e465475169a8d84e96e6342e4ac6f6265153f9/MK-COLOR-TYPE-WHITE.png"
          class="logo"
        />
      </div>
    </div>

    <!-- ==================== HEADER ==================== -->
    <header>
      <div style="display: flex; align-items: center; gap: 14px">
        <img
          src="https://raw.githubusercontent.com/mediakitaproductions/imageapp/555c0fffa480ce0dc7d5f422ddd117123511b742/mkp-logo-white-title.png"
          style="height: 34px"
        />
        <div class="title">MEDIA KITA SCHEDULE</div>
      </div>
      <div id="clock"></div>
    </header>

    <!-- ==================== MAIN LAYOUT ==================== -->
    <div class="main">
      <!-- TOP: UPCOMING EVENT -->
      <div class="top-section">
        <div class="highlight-title">UPCOMING EVENT</div>
        <div id="highlight" class="highlight-box"></div>
      </div>

      <!-- BOTTOM: TWO COLUMNS -->
      <div class="bottom-section">
        <!-- LEFT PANEL - CREW -->
        <div class="left">
          <!-- CREW SECTION -->
          <div class="crew-section">
            <div class="crew-title">OUR CREW</div>
            <div class="crew-slider">
              <img id="crewImage" src="" />
            </div>
          </div>
        </div>

        <!-- RIGHT PANEL - EVENTS -->
        <div class="right">
          <!-- SCROLLABLE CONTENT -->
          <div id="scrollWrapper">
            <div id="scrollContent"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // ==================== CONSTANTS & VARIABLES ====================
      const apiURL =
        "https://script.google.com/macros/s/AKfycbxRLGXgLuH1Wt6isqes6Cp5pWEu-G5yNO93U8sISMLpOBjXpxt-RbI5CpD73xXf0Qar/exec";

      let crew = [];
      let crewIndex = 0;

      let y = 0;
      let events = [];
      let highlightEvents = [];
      let highlightIndex = 0;

      // ==================== UTILITY FUNCTIONS ====================
      function safe(v) {
        return v || "-";
      }

      function formatDate(v) {
        let d = new Date(v);
        const day = String(d.getDate()).padStart(2, "0");
        const month = d.toLocaleDateString("id-ID", { month: "short" });
        return `${day} ${month}`;
      }

      function getMonthName(v) {
        let d = new Date(v);
        return d.toLocaleDateString("id-ID", {
          month: "long",
          year: "numeric",
        });
      }

      function parseDate(v) {
        return v ? new Date(v) : new Date(0);
      }

      function isPast(event) {
        const now = new Date();
        const end = event.Tanggal_Selesai
          ? parseDate(event.Tanggal_Selesai)
          : parseDate(event.Tanggal_Mulai);
        return end < now;
      }

      function isWithinPastWindow(event) {
        const now = new Date();
        const cutoff = new Date(
          now.getFullYear(),
          now.getMonth() - 2,
          now.getDate(),
        );
        const end = event.Tanggal_Selesai
          ? parseDate(event.Tanggal_Selesai)
          : parseDate(event.Tanggal_Mulai);
        return end >= cutoff;
      }

      function isFutureEvent(event) {
        const now = new Date();
        const start = parseDate(event.Tanggal_Mulai);
        return start >= new Date(now.getFullYear(), now.getMonth(), 1);
      }

      // ==================== CREW FUNCTIONS ====================
      async function loadCrew() {
        try {
          let allFiles = [];
          let page = 1;

          while (true) {
            const res = await fetch(
              `https://api.github.com/repos/mediakitaproductions/foto-tim-mk/contents/?per_page=100&page=${page}`,
            );
            if (!res.ok) {
              throw new Error(
                `GitHub API error: ${res.status} ${res.statusText}`,
              );
            }

            const data = await res.json();
            if (!Array.isArray(data) || data.length === 0) {
              break;
            }

            allFiles = allFiles.concat(data);
            if (data.length < 100) {
              break; // no more pages
            }
            page++;
          }

          crew = allFiles
            .filter(
              (file) => file.name && file.name.toLowerCase().endsWith(".webp"),
            )
            .map((file) => ({
              name: file.name.replace(/\.webp$/i, "").toUpperCase(),
              foto: file.download_url
                .replace("raw.githubusercontent.com", "cdn.jsdelivr.net/gh")
                .replace("/main/", "@main/"),
            }));

          // Shuffle crew for random order
          crew.sort(() => Math.random() - 0.5);

          console.log("Crew auto loaded:", crew);

          // INIT CREW
          if (crew.length > 0) {
            crewIndex = 0;
            displayCrew(crewIndex);
            setInterval(rotateCrew, 5000);
          }
        } catch (err) {
          console.error("Gagal load crew:", err);
        }
      }

      function displayCrew(index) {
        const img = document.getElementById("crewImage");

        if (index >= crew.length) index = 0;

        const current = crew[index];

        img.onerror = () => {
          console.warn(
            `Foto gagal dimuat: ${current.name}, mencoba gambar berikutnya...`,
          );
          crewIndex = (crewIndex + 1) % crew.length;
          displayCrew(crewIndex);
        };

        img.src = current.foto;
      }

      function rotateCrew() {
        const img = document.getElementById("crewImage");
        const slider = document.querySelector(".crew-slider");

        if (!crew.length) return;

        const nextIndex = (crewIndex + 1) % crew.length;

        // reset dulu biar aman
        img.classList.remove("fade-in", "fade-out");

        // paksa reflow (penting!)
        void img.offsetWidth;

        // animasi keluar
        img.classList.add("fade-out");
        slider.classList.add("active");

        setTimeout(() => {
          crewIndex = nextIndex;

          const current = crew[crewIndex];

          // update gambar langsung (lebih stabil)
          img.src = current.foto;

          // animasi masuk
          img.classList.remove("fade-out");
          img.classList.add("fade-in");

          // reset class
          setTimeout(() => {
            img.classList.remove("fade-in");
            slider.classList.remove("active");
          }, 700);
        }, 400);
      }

      // ==================== EVENT FUNCTIONS ====================
      function startScroll() {
        const el = document.getElementById("scrollContent");
        function animate() {
          y -= 0.35;
          el.style.transform = `translateY(${y}px)`;
          if (Math.abs(y) >= el.scrollHeight / 2) {
            y = 0;
          }
          requestAnimationFrame(animate);
        }
        animate();
      }

      function renderHighlight(e) {
        const date = parseDate(e.Tanggal_Mulai);
        const dateNum = String(date.getDate()).padStart(2, "0");
        const dateMonth = date
          .toLocaleDateString("id-ID", { month: "short" })
          .toUpperCase();

        return `
    <div>
      <div class="hl-date-num">${dateNum}</div>
      <div class="hl-date-month">${dateMonth}</div>
    </div>
    <div>
      <div class="hl-event-title">${safe(e.Nama_Event)}</div>
      <div class="hl-event-subtitle">${safe(e.Client_ID)}</div>
    </div>
    <div>
      <div class="hl-time-val">${safe(e.PIC)}</div>
      <div class="hl-location-val">${safe(e.Lokasi)}</div>
    </div>
  `;
      }

      function rotateHighlight() {
        const box = document.getElementById("highlight");
        if (!highlightEvents.length) return;

        box.style.opacity = 0;
        box.style.transform = "translateX(50px)";

        setTimeout(() => {
          highlightIndex = (highlightIndex + 1) % highlightEvents.length;
          const current = highlightEvents[highlightIndex];

          box.innerHTML = renderHighlight(current);
          box.style.opacity = 1;
          box.style.transform = "translateX(0)";

          // Apply color variant based on index
          const colors = [
            "color-blue",
            "color-pink",
            "color-gray",
            "color-dark",
          ];
          const colorClass = colors[highlightIndex % colors.length];
          box.className = "highlight-box " + colorClass;

          // 🔥 SYNC KE TABLE
          syncHighlightToTable(current.Nama_Event);
        }, 350);
      }

      function generateTableHTML(events) {
        // Group events by month
        let grouped = {};
        events.forEach((event) => {
          let month = getMonthName(event.Tanggal_Mulai);
          if (!grouped[month]) grouped[month] = [];
          grouped[month].push(event);
        });

        let monthList = Object.keys(grouped)
          .map((month) => ({
            month,
            events: grouped[month],
            minDate: Math.min(
              ...grouped[month].map((e) => parseDate(e.Tanggal_Mulai)),
            ),
          }))
          .sort((a, b) => a.minDate - b.minDate);

        let html = "";
        monthList.forEach((group) => {
          html += `<div class="month">${group.month}</div>`;
          group.events.forEach((row) => {
            const date = parseDate(row.Tanggal_Mulai);
            const dateNum = String(date.getDate()).padStart(2, "0");
            const dateMonth = date
              .toLocaleDateString("id-ID", { month: "short" })
              .toUpperCase();

            html += `
      <div class="row ${isPast(row) ? "past-row" : ""}" data-event="${row.Nama_Event}">
        <div>
          <div class="date-num">${dateNum}</div>
          <div class="date-month">${dateMonth}</div>
        </div>
        <div class="detail-cell">
          <div class="event-title">${safe(row.Nama_Event)}</div>
          <div class="event-subtitle">${safe(row.Client_ID)}</div>
        </div>
        <div class="time-location">
          <div class="time-val">${safe(row.PIC)}</div>
          <div class="location-val">${safe(row.Lokasi)}</div>
        </div>
      </div>`;
          });
        });
        return html;
      }

      function decodeText(element, finalText, onComplete) {
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890";
        let iterations = 0;

        const interval = setInterval(() => {
          element.innerText = finalText
            .split("")
            .map((char, index) => {
              if (index < iterations) return char;
              return chars[Math.floor(Math.random() * chars.length)];
            })
            .join("");

          if (iterations >= finalText.length) {
            clearInterval(interval);

            // 🔥 trigger selesai decode
            if (onComplete) onComplete();
          }

          iterations += 1 / 2;
        }, 30);
      }

      // ==================== MAIN FUNCTIONS ====================
      async function loadData() {
        const res = await fetch(apiURL);
        const data = await res.json();
        localStorage.setItem("events_cache", JSON.stringify(data));

        events = data
          .filter((event) => isWithinPastWindow(event))
          .sort(
            (a, b) => parseDate(a.Tanggal_Mulai) - parseDate(b.Tanggal_Mulai),
          );

        highlightEvents = events.filter((e) => !isPast(e));

        if (highlightEvents.length > 0) {
          const highlightEl = document.getElementById("highlight");
          highlightEl.innerHTML = renderHighlight(highlightEvents[0]);
          highlightEl.className = "highlight-box color-blue";
        } else {
          document.getElementById("highlight").innerHTML =
            "<div class='hl-title'>Tidak ada event bulan ini & depan</div>";
        }

        let html = generateTableHTML(events);

        document.getElementById("scrollContent").innerHTML = html + html;

        startScroll();
        setInterval(rotateHighlight, 15000);
      }

      function syncHighlightToTable(eventName) {
        const rows = document.querySelectorAll(".row");

        rows.forEach((row) => {
          if (row.dataset.event === eventName) {
            // reset animasi
            row.classList.remove("active");

            void row.offsetWidth; // force reflow (penting!)

            row.classList.add("active");

            // 🔥 decode tetap jalan (kalau kamu pakai)
            const cells = row.querySelectorAll("div");

            let finished = 0;

            cells.forEach((cell, i) => {
              const original = cell.innerText;

              setTimeout(() => {
                decodeText(cell, original, () => {
                  finished++;

                  // kalau semua cell selesai decode
                  if (finished === cells.length) {
                    row.classList.add("decoded");
                  }
                });
              }, i * 80);
            });
          } else {
            row.classList.remove("active", "decoded");
          }
        });
      }

      // ==================== AUTO REFRESH FUNCTIONS ====================
      async function refreshData() {
        try {
          console.log("Update data...");

          const res = await fetch(apiURL);
          const data = await res.json();

          events = data
            .filter((event) => isWithinPastWindow(event))
            .sort(
              (a, b) => parseDate(a.Tanggal_Mulai) - parseDate(b.Tanggal_Mulai),
            );

          // UPDATE HIGHLIGHT (HALUS)
          const box = document.getElementById("highlight");
          box.style.opacity = 0;

          setTimeout(() => {
            highlightEvents = events.filter((e) => !isPast(e));
            if (highlightIndex >= highlightEvents.length) highlightIndex = 0;
            if (highlightEvents.length > 0) {
              box.innerHTML = renderHighlight(highlightEvents[highlightIndex]);
              const colors = [
                "color-blue",
                "color-pink",
                "color-gray",
                "color-dark",
              ];
              const colorClass = colors[highlightIndex % colors.length];
              box.className = "highlight-box " + colorClass;
            } else {
              box.innerHTML =
                "<div class='hl-title'>Tidak ada event bulan ini & depan</div>";
            }
            box.style.opacity = 1;
          }, 400);

          // UPDATE TABLE
          let html = generateTableHTML(events);

          document.getElementById("scrollContent").innerHTML = html + html;
        } catch (err) {
          console.error("Gagal update:", err);
        }
      }

      // ==================== INITIALIZATION ====================
      // Clock update
      setInterval(() => {
        document.getElementById("clock").innerText =
          new Date().toLocaleTimeString();
      }, 1000);

      // Load initial data
      const MIN_LOADING = 1200;
      const startTime = Date.now();

      Promise.all([loadData(), loadCrew()]).then(() => {
        const loader = document.getElementById("loader");

        const elapsed = Date.now() - startTime;
        const delay = Math.max(0, MIN_LOADING - elapsed);

        setTimeout(() => {
          // munculin UI pelan
          document.body.classList.add("ready");

          // animasi cinematic keluar
          loader.classList.add("hide");

          // remove setelah animasi selesai
          setTimeout(() => {
            loader.remove();
          }, 900);
        }, delay);
      });

      // Auto refresh every 30 seconds
      setInterval(refreshData, 30000);
    </script>
  </body>
</html>
